<div class="perfil-container">

  <h1>Perfil</h1>

  <!-- Nombre -->
  <input
    type="text"
    placeholder="Nombre"
    [(ngModel)]="nombre"
  >

  <!-- Cedula -->
  <input
    type="text"
    placeholder="Cedula"
    [(ngModel)]="cedula"
    pattern="[0-9]{6,10}"
  >

  <!-- Telefono -->
  <input
    type="text"
    placeholder="Telefono"
    [(ngModel)]="telefono"
    pattern="[0-9]{10}"
  >

  <!-- Correo -->
  <input
    type="email"
    placeholder="Correo"
    [(ngModel)]="correo"
  >

  <!-- Password -->
  <input
    type="password"
    placeholder="Contraseña"
    [(ngModel)]="password"
  >

  <!-- Botón -->
  <button (click)="actualizar()">
    Actualizar
  </button>

</div>
