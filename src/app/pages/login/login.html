<div class="container">

  <h1>Iniciar Sesión</h1>

  <form>

    <label>Correo</label>

    <input
      type="email"
      [(ngModel)]="correo"
      name="correo"
    >

    <label>Contraseña</label>

    <input
      type="password"
      [(ngModel)]="password"
      name="password"
    >

    <button type="button" (click)="login()">
      Ingresar
    </button>

  </form>

</div>
